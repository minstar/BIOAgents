# ============================================================
# Full 4-Modality GRPO — Qwen3.5-9B (No SFT, No OPD)
# ============================================================
# First experiment with Qwen3.5-9B:
#   - Built-in tool calling → should fix resp_len=0 problem
#   - Unified multimodal (text+vision) architecture
#   - Pure GRPO from base model (no SFT teacher yet)
#   - Uses train_multiturn() with GYM environment
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --rl-config configs/full_4modality_grpo_qwen35_9b.yaml
# ============================================================

# --- Model (Student: Qwen3.5-9B) ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Qwen3.5-9B"
  torch_dtype: "bfloat16"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset: Full 4-modality combined ---
dataset:
  domain: "full_4modality"
  tasks_path: "data/domains/full_4modality_combined/tasks.json"
  split_tasks_path: "data/domains/full_4modality_combined/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 4096
  max_completion_length: 1024

# --- Training (GRPO, no OPD) ---
training:
  output_dir: "checkpoints/full_4modality_grpo_qwen35_9b"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 25
  eval_steps: 25
  save_total_limit: 15
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.04
  temperature: 0.9
  top_p: 0.95
  top_k: 50

  max_train_tasks: -1  # use all tasks (3338)
  loss_type: "grpo"
  scale_rewards: "none"

  dynamic_sampling: true
  dynamic_sampling_min_mixed_ratio: 0.1

  overlong_reward_shaping: true
  overlong_safe_length: 768
  overlong_penalty_factor: 0.5

# --- Reward ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.4
    - name: "format"
      weight: 0.2
    - name: "process"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"
  bertscore_max_length: 512

# --- NO OPD (pure GRPO baseline for Qwen3.5-9B) ---
# opd section intentionally omitted

# --- Environment ---
environment:
  max_turns: 20
  use_gym_env: true
  domains:
    - "medical_qa"
    - "visual_diagnosis"
    - "clinical_diagnosis"
    - "drug_interaction"
    - "ehr_management"
    - "triage_emergency"
    - "psychiatry"
    - "obstetrics"

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "full_4modality_grpo_qwen35_9b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "Full 4-Modality GRPO — Qwen3.5-9B (No SFT, No OPD)"
  description: >
    First Qwen3.5-9B experiment: pure GRPO from base model.
    Qwen3.5 has built-in tool calling and multimodal support,
    eliminating the resp_len=0 problem seen with Lingshu-7B.
    9.4B params, unified text+vision architecture.
