# ============================================================
# OPD Option 2: Self-Evolving Iterative OPD (G-OPD λ>1)
# ============================================================
# Teacher = previous RL checkpoint (same model family)
# Student = current model continuing RL
# λ>1 reward extrapolation allows surpassing teacher.
#
# Self-evolving concept: same tokenizer guaranteed, each iteration
# the student becomes the next teacher. Iteratively breaks ceiling.
#
# Reference: G-OPD (arXiv:2602.12125), Self-Distilled Reasoner (2601.18734)
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/drgrpo_lingshu7b/checkpoint-950-merged \
#       --rl-config configs/opd_self_evolving_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training ---
training:
  output_dir: "checkpoints/opd_self_evolving_lingshu7b"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 5
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # Dr. GRPO normalization
  use_dr_grpo: true
  loss_type: "grpo"
  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- On-Policy Distillation (Self-Evolving with λ>1) ---
opd:
  use_opd: true
  # Teacher = Dr.GRPO step 950 (best agentic checkpoint)
  # Student starts fresh from same base, learns to surpass via λ>1
  opd_teacher_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/drgrpo_lingshu7b/checkpoint-950-merged"
  opd_mode: "self_evolving"
  opd_alpha: 0.3          # 30% RL + 70% OPD (teacher-heavy, trust the evolved self)
  opd_lambda: 1.25        # G-OPD reward extrapolation: surpass teacher by 25%
  opd_warmup_steps: 30    # Shorter warmup since teacher is already strong

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "opd_self_evolving_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "OPD Option 2 — Self-Evolving Iterative OPD"
  description: >
    G-OPD with λ=1.25 reward extrapolation. Dr.GRPO step 950
    checkpoint as teacher, student aims to surpass via dense
    supervision + extrapolated advantage. Tests whether self-
    evolving OPD can break the ~62% MedQA ceiling.
