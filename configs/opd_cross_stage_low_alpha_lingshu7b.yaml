# ============================================================
# OPD Option 1b: Cross-Stage with Low Alpha (KL-safe)
# ============================================================
# Same as cross_stage but with α=0.3, λ=0.5 to reduce KL blow-up.
# Hypothesis: OPD α=0.5 causes KL explosion (0.035→3.23 in 3 epochs).
# Lower α (more RL weight) + lower λ (weaker OPD signal) should
# maintain reward stabilization while preventing KL divergence.
#
# Comparison: opd_cross_stage_lingshu7b.yaml (α=0.5, λ=1.0, warmup=50)
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/drgrpo_lingshu7b/checkpoint-950-merged \
#       --rl-config configs/opd_cross_stage_low_alpha_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training ---
training:
  output_dir: "checkpoints/opd_cross_stage_low_alpha_lingshu7b"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 5
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # Dr. GRPO normalization
  use_dr_grpo: true
  loss_type: "grpo"
  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- On-Policy Distillation (LOW ALPHA — KL-safe variant) ---
opd:
  use_opd: true
  opd_teacher_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/sft_warmup_lingshu7b_v2_merged/merged"
  opd_mode: "cross_stage"
  opd_alpha: 0.3          # 70% RL + 30% OPD (vs 50/50 in original)
  opd_lambda: 0.5         # Half-strength OPD signal (vs 1.0 in original)
  opd_warmup_steps: 50    # Same warmup as original for fair comparison

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "opd_cross_stage_low_alpha_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "OPD Option 1b — Cross-Stage Low Alpha (KL-safe)"
  description: >
    Ablation of OPD cross-stage with reduced alpha (0.3 vs 0.5) and
    lambda (0.5 vs 1.0). Tests hypothesis that OPD KL explosion is
    caused by too-strong teacher influence. Expected: slower KL growth,
    similar reward stabilization effect.
