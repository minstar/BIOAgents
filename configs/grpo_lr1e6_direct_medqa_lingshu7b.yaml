# ============================================================
# LR=1e-6 + Direct MedQA — Lingshu-7B (H12 Experiment)
# ============================================================
# Tests moderate LR on direct QA (no tools).
# H5 showed +2.1pp at LR=5e-7; does 2x LR improve further?
#
# Usage:
#   CUDA_VISIBLE_DEVICES=X python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/sft_warmup_lingshu7b_v2_merged/merged \
#       --rl-config configs/grpo_lr1e6_direct_medqa_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT (matched) ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset: Direct QA (no tool scaffolding) ---
dataset:
  domain: "medical_qa_direct"
  tasks_path: "data/domains/medical_qa_direct_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_direct_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 256

# --- Training: 2x LR ---
training:
  output_dir: "checkpoints/grpo_lr1e6_direct_medqa_lingshu7b"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 5
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  loss_type: "grpo"
  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward: Accuracy-only ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 1.0
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment: No tool-use ---
environment:
  max_turns: 1
  use_gym_env: false

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "grpo_lr1e6_direct_medqa_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "H12: LR=1e-6 + Direct MedQA — Lingshu-7B"
  description: >
    Tests whether 2x LR on direct QA improves beyond H5's +2.1pp.
    H5 at LR=5e-7 reached 62.8% (from 60.7% SFT baseline).
    Moderate LR may enable faster/larger improvements.
