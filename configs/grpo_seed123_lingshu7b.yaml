# ============================================================
# Standard GRPO Baseline — Lingshu-7B
# ============================================================
# For RL algorithm comparison table (RQ1).
# Matched conditions to GSPO+DAPO v2: same model, SFT checkpoint,
# dataset, training budget, LoRA config, reward function.
# Only difference: standard GRPO loss (no DAPO/GSPO modifications).
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/sft_warmup_lingshu7b_v2_merged/merged \
#       --rl-config configs/grpo_baseline_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT (matched to GSPO+DAPO v2) ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset (matched) ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training (Standard GRPO — no DAPO/GSPO modifications) ---
training:
  output_dir: "checkpoints/grpo_seed123_lingshu7b"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 7
  seed: 123

  # GRPO-specific (matched hyperparams)
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # Standard GRPO loss (key difference from GSPO+DAPO)
  loss_type: "grpo"

  # Explicitly disable GSPO/DAPO features (trainer defaults to True)
  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward (matched to GSPO+DAPO v2) ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "grpo_seed123_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "GRPO Seed-123 — Lingshu-7B"
  description: >
    Standard GRPO (no DAPO epsilon clipping, no dynamic sampling,
    no overlong reward shaping). All other hyperparams matched to
    GSPO+DAPO v2 for fair algorithm comparison.
