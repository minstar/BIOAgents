# ============================================================
# Dr.GRPO + Low Format Weight (5%) — Lingshu-7B (H13 Experiment)
# ============================================================
# Combines two successful mechanisms:
# 1. Dr.GRPO per-token normalization (4.8x agentic acc improvement)
# 2. Low format weight (reduces format dominance from 40% to 5%)
#
# Hypothesis: Dr.GRPO already achieves 12x reduction in format
# dominance via length normalization. Adding low format weight
# should further amplify accuracy signal → faster/larger improvement.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=X python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/sft_warmup_lingshu7b_v2_merged/merged \
#       --rl-config configs/drgrpo_lowfmt_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT (matched) ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset (matched) ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training: Dr.GRPO + low format ---
training:
  output_dir: "checkpoints/drgrpo_lowfmt_lingshu7b"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 5
  seed: 42

  # GRPO-specific (matched)
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # Dr. GRPO: per-token length normalization
  use_dr_grpo: true
  loss_type: "grpo"

  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward: Low format weight (5%) ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.95
    - name: "format"
      weight: 0.05
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "drgrpo_lowfmt_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "H13: Dr.GRPO + Low Format (5%) — Lingshu-7B"
  description: >
    Combines Dr.GRPO's per-token normalization (proven 4.8x agentic
    acc improvement) with low format weight (5% instead of 40%).
    Dr.GRPO already reduces effective format dominance from 60:1 to 5:1.
    Low format weight should further reduce to ~0.6:1, maximizing
    accuracy signal while maintaining basic format compliance.
