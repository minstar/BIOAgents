# ============================================================
# BIOAgents DRPO (Domain-aware Relative Policy Optimization) Config
# ============================================================
# Applies domain-aware reward scaling to prevent over-fitting to
# easy/frequent domains. Scales rewards by:
#   - Domain rarity (upweight rare domains)
#   - Modality difficulty (text < vision < multi-modal)
#   - Domain difficulty (per-domain complexity scale)
#
# Best for: Multi-domain training, VL tasks, cross-domain pathways
#
# Reference: QoQ-Med (NeurIPS 2025 Oral, arXiv:2506.00711)
#
# Usage:
#   python bioagents/training/grpo_trainer.py --config configs/grpo_drpo_strategy.yaml
# ============================================================

model:
  name_or_path: "Qwen/Qwen2.5-VL-7B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

peft:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  domain: "visual_diagnosis"       # DRPO shines on VL + multi-domain
  tasks_path: "data/domains/visual_diagnosis/tasks.json"
  split_tasks_path: "data/domains/visual_diagnosis/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

training:
  output_dir: "checkpoints/grpo_drpo_visual_diagnosis"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  save_total_limit: 3
  seed: 42
  num_generations: 4
  beta: 0.04
  temperature: 0.7

rewards:
  strategy: "drpo"
  strategy_config:
    # Base reward weights (same as GRPO)
    grpo_weights:
      accuracy: 0.4
      format: 0.2
      process: 0.4
    # DRPO-specific parameters
    drpo_rarity_exponent: 0.5           # Frequency^(-0.5) for rarity scaling
    drpo_domain_rarity_weight: 0.4
    drpo_modality_difficulty_weight: 0.3
    drpo_modality_scales:
      text: 1.0
      vision: 1.3
      multi_modal: 1.5
    drpo_domain_difficulty:
      medical_qa: 0.8
      clinical_diagnosis: 1.0
      drug_interaction: 1.0
      ehr_management: 1.1
      triage_emergency: 1.2
      psychiatry: 1.1
      obstetrics: 1.1
      visual_diagnosis: 1.3
      radiology_report: 1.4
      cross_domain: 1.5
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

environment:
  max_turns: 12
  use_gym_env: true

logging:
  project: "pt2-minstar-gym-rl"
  run_name: "grpo_drpo_visual_diagnosis"
  use_wandb: true
  log_dir: "logs/runs"

meta:
  experiment: "DRPO strategy for VL domains"
  description: >
    DRPO (Domain-aware Relative Policy Optimization) based on QoQ-Med
    (NeurIPS 2025 Oral). Applies hierarchical reward scaling by domain
    rarity, modality difficulty, and domain complexity. Prevents
    over-fitting to easy domains and ensures balanced multi-domain learning.
