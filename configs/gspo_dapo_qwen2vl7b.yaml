# ============================================================
# GSPO + DAPO Training Config — Qwen2.5-VL-7B Medical QA
# ============================================================
# Same GSPO/DAPO setup as Lingshu-7B but for the VL model.
# Note: Qwen2.5-VL was severely damaged by original GRPO (54%→10.5%)
# This config uses the ORIGINAL checkpoint, not the damaged one.
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Qwen2.5-VL-7B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa/tasks.json"
  split_tasks_path: "data/domains/medical_qa/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training (GSPO/DAPO) ---
training:
  output_dir: "checkpoints/gspo_dapo_qwen2vl7b"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 3
  seed: 42

  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # GSPO/DAPO
  loss_type: "dapo"
  epsilon_low: 0.2
  epsilon_high: 0.28
  importance_sampling_level: "sequence"
  scale_rewards: "none"
  dynamic_sampling: true
  overlong_reward_shaping: true
  overlong_safe_length: 768
  overlong_penalty_factor: 0.5

# --- Reward ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "gspo_dapo_qwen2vl7b_v1"
  use_wandb: true
  log_dir: "logs/runs"

meta:
  experiment: "GSPO+DAPO Qwen2.5-VL-7B (B041 fix)"
  description: >
    GSPO/DAPO training for Qwen2.5-VL-7B. Uses simplified reward
    (accuracy 0.6 + format 0.4) per MediX-R1 approach.
    Must use ORIGINAL checkpoint, not B041-damaged one.
