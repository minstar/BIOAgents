# ============================================================
# GSPO + DAPO Training Config v2 — Lingshu-7B (Longer Training)
# ============================================================
# v2 improvements over v1:
#   - Uses SFT-warmed model (from v2 20K warmup)
#   - More training epochs (10 vs 3) for meaningful improvement
#   - Simplified reward: accuracy 0.6 + format 0.4 (per MediX-R1)
#   - Same GSPO/DAPO B041 fix
#
# Usage:
#   python scripts/train_two_stage.py \
#       --sft-config configs/sft_warmup_lingshu7b_v2.yaml \
#       --rl-config configs/gspo_dapo_lingshu7b_v2.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training (GSPO/DAPO, longer run) ---
training:
  output_dir: "checkpoints/gspo_dapo_lingshu7b_v2"
  num_train_epochs: 10            # Much longer than v1 (3 epochs)
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7           # Even lower LR for longer training
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 7
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # GSPO/DAPO (B041 fix)
  loss_type: "dapo"
  epsilon_low: 0.2
  epsilon_high: 0.28
  importance_sampling_level: "sequence"
  scale_rewards: "none"

  # Dynamic Sampling
  dynamic_sampling: true
  dynamic_sampling_min_mixed_ratio: 0.1

  # Overlong Reward Shaping
  overlong_reward_shaping: true
  overlong_safe_length: 768
  overlong_penalty_factor: 0.5

# --- Reward (simplified per MediX-R1) ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "gspo_dapo_lingshu7b_v2_long"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "GSPO+DAPO Lingshu-7B v2 (longer training)"
  description: >
    v2: 10 epochs (vs 3), SFT warmup with 20K opensource data,
    simplified reward (accuracy 0.6 + format 0.4), lower LR (5e-7).
    Target: MedQA 65%+ from baseline 57%.
