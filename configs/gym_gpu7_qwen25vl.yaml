# Phase 2 GYM — GPU 7 전용: qwen25vl_weakness_fixer
# GPU 7 idle 감지 후 즉시 시작 (2026-03-10)
# Usage: python scripts/run_autonomous_gym.py --config configs/gym_gpu7_qwen25vl.yaml

gym:
  num_gpus: 1
  gpu_ids: [7]
  safety_score_floor: 0.20
  max_consecutive_failures: 8
  cooldown_seconds: 120
  max_queue_size: 50
  idle_check_interval: 10.0
  log_dir: logs/autonomous_gym
  logbook_dir: logs/shared_logbook
  wandb_project: pt2-minstar-gym-rl
  continuous: true
  eval_timeout_seconds: 172800   # 48h — eval 완주까지 충분히 대기
  train_timeout_seconds: 172800  # 48h

benchmark:
  every_n_cycles: 3
  max_samples: 0

agents:
- agent_id: qwen25vl_weakness_fixer
  model_path: /data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Qwen2.5-VL-7B-Instruct
  base_model_path: /data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Qwen2.5-VL-7B-Instruct
  backend: transformers
  gpus_for_eval: 1
  gpus_for_train: 1
  curiosity_weight: 0.10
  weakness_weight: 0.35
  peer_learning_weight: 0.20
  diversity_weight: 0.10
  mastery_push_weight: 0.15
  safety_weight: 0.10
  max_turns: 8
  eval_tasks_per_domain: 5       # 5 tasks/domain → 빠른 iteration (~50 tasks/cycle)
  training_epochs: 1             # Reduced: prevent overfitting (was 2)
  learning_rate: 5.0e-06         # Reduced: conservative with KL penalty (was 2e-5)
  max_train_tasks: 20            # Cap tasks per GRPO cycle
  quality_threshold: 0.1         # fallback (adaptive_quality가 우선)
  adaptive_quality: true          # 점수 분포 기반 적응적 필터링
  adaptive_quality_lo: 0.2        # 하위 20% 제외 (너무 어려움)
  adaptive_quality_hi: 0.8        # 상위 20% 제외 (이미 마스터)
  mastery_threshold: 0.9
  output_dir: checkpoints/autonomous/qwen25vl_weakness_fixer
  log_dir: logs/autonomous/qwen25vl_weakness_fixer
