# ============================================================
# BIOAgents CRPO (Clinical-objective Relative Policy Optimization) Config
# ============================================================
# Extends GRPO for clinical domains by jointly optimizing four
# clinical objectives critical for high-stakes medical reasoning:
#   1. Accuracy — Correctness of the final answer
#   2. Faithfulness — Grounded in evidence, no hallucinations
#   3. Completeness — Covers all clinically relevant aspects
#   4. Safety — No harmful recommendations or missed red flags
#
# Best for: Complex clinical cases, patient-facing tasks, safety-critical domains
#
# Reference: Clinical-R1 (arXiv:2512.00601)
#
# Usage:
#   python bioagents/training/grpo_trainer.py --config configs/grpo_crpo_strategy.yaml
# ============================================================

model:
  name_or_path: "Qwen/Qwen2.5-VL-7B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

peft:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  domain: "clinical_diagnosis"       # CRPO ideal for complex clinical tasks
  tasks_path: "data/domains/clinical_diagnosis/tasks.json"
  split_tasks_path: "data/domains/clinical_diagnosis/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1536        # Longer for completeness

training:
  output_dir: "checkpoints/grpo_crpo_clinical_diagnosis"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  save_total_limit: 3
  seed: 42
  num_generations: 4
  beta: 0.04
  temperature: 0.7

rewards:
  strategy: "crpo"
  strategy_config:
    # CRPO multi-objective weights
    crpo_accuracy_weight: 0.35        # Correctness of diagnosis
    crpo_faithfulness_weight: 0.30    # Evidence-grounded, no hallucinations
    crpo_completeness_weight: 0.20    # Covers history, exam, DDx, plan
    crpo_safety_weight: 0.15          # No harmful recommendations
    # Faithfulness sub-parameters
    crpo_hallucination_penalty: -0.3  # Per fabricated claim
    crpo_evidence_bonus: 0.15         # Per evidence citation
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

environment:
  max_turns: 15                       # More turns for thorough clinical workflow
  use_gym_env: true

# Curriculum Learning (optional, recommended for CRPO)
curriculum:
  enabled: true
  min_tasks_per_level: 5
  warmup_cycles: 2
  level_thresholds:
    1: 0.50
    2: 0.55
    3: 0.60
    4: 0.65

logging:
  project: "pt2-minstar-gym-rl"
  run_name: "grpo_crpo_clinical_diagnosis"
  use_wandb: true
  log_dir: "logs/runs"

meta:
  experiment: "CRPO strategy for Clinical Diagnosis"
  description: >
    CRPO (Clinical-objective Relative Policy Optimization) based on
    Clinical-R1 (arXiv:2512.00601). Jointly optimizes accuracy,
    faithfulness, completeness, and safety for complex clinical cases.
    Includes hallucination penalty and evidence citation bonus.
    Curriculum learning enabled for progressive difficulty.
