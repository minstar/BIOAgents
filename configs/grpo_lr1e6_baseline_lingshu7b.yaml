# ============================================================
# LR=1e-6 + Baseline Reward — Lingshu-7B (H11 Experiment)
# ============================================================
# Tests moderate LR with standard reward composition.
# Isolates the LR effect from reward composition changes.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=X python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/sft_warmup_lingshu7b_v2_merged/merged \
#       --rl-config configs/grpo_lr1e6_baseline_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT (matched) ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset (same agentic tasks) ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training: 2x baseline LR ---
training:
  output_dir: "checkpoints/grpo_lr1e6_baseline_lingshu7b"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 5
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  loss_type: "grpo"
  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward (same as baseline) ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "grpo_lr1e6_baseline_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "H11: LR=1e-6 + Baseline Reward — Lingshu-7B"
  description: >
    Tests whether moderate LR (1e-6, 2x baseline) with standard
    reward composition (60% accuracy, 40% format) produces meaningful
    policy change without the instability seen at 5e-6.
