# ============================================================
# DAPO-only Ablation — Lingshu-7B
# ============================================================
# For RL algorithm comparison table (RQ1).
# DAPO asymmetric clipping + dynamic sampling + overlong shaping,
# but WITHOUT GSPO's sequence-level importance sampling.
# All other hyperparams matched.
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/sft_warmup_lingshu7b_v2_merged/merged \
#       --rl-config configs/dapo_only_lingshu7b.yaml
# ============================================================

# --- Model ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT (matched) ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset (matched) ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training (DAPO-only: asymmetric clipping, NO sequence-level IS) ---
training:
  output_dir: "checkpoints/dapo_only_lingshu7b"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 7
  seed: 42

  # GRPO-specific (matched)
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # DAPO: asymmetric clipping (key feature)
  loss_type: "dapo"
  epsilon_low: 0.2
  epsilon_high: 0.28
  # Token-level IS (NOT sequence-level = no GSPO)
  importance_sampling_level: "token"
  scale_rewards: "none"

  # DAPO features enabled
  dynamic_sampling: true
  dynamic_sampling_min_mixed_ratio: 0.1
  overlong_reward_shaping: true
  overlong_safe_length: 768
  overlong_penalty_factor: 0.5

# --- Reward (matched) ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "dapo_only_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "DAPO-only Ablation — Lingshu-7B"
  description: >
    DAPO asymmetric epsilon clipping (0.2/0.28) with dynamic sampling
    and overlong reward shaping, but token-level importance sampling
    (no GSPO). Isolates DAPO's contribution from GSPO.
