# ============================================================
# SFT Warmup Config v2 — Lingshu-7B (20K opensource data)
# ============================================================
# Larger SFT warmup with contamination-free opensource data.
# Uses 20K samples from medical-o1-reasoning, bioinstruct,
# wikidoc, flashcards. 2 epochs for better coverage.
#
# Usage:
#   python scripts/train_two_stage.py \
#       --sft-config configs/sft_warmup_lingshu7b_v2.yaml \
#       --rl-config configs/gspo_dapo_lingshu7b.yaml
# ============================================================

model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  sft_path: "datasets/sft/opensource_medical_sft.jsonl"
  min_reward: 0.0              # No reward filtering for external data
  max_samples: 5000            # Use 5K for warmup (not all 20K)
  max_length: 4096
  train_ratio: 0.95

training:
  output_dir: "checkpoints/sft_warmup_lingshu7b_v2"
  num_train_epochs: 2            # 2 epochs for better coverage
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6          # Conservative LR
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  save_steps: 200
  eval_steps: 100
  save_total_limit: 2
  seed: 42

logging:
  project: "pt2-minstar-gym-rl"
  run_name: "sft_warmup_lingshu7b_v2_20k"
  use_wandb: true
  log_dir: "logs/runs"
