# ============================================================
# Full 4-Modality OPD Training v2 — Lingshu-7B (No SFT warmup)
# ============================================================
# CHANGES from v1:
#   1. LR: 5e-7 → 5e-6 (10x increase, loss=0.0 fix)
#   2. warmup_ratio: 0.05 → 0.03 (faster warmup)
#   3. num_generations: 8 → 16 (more reward variance)
#   4. temperature: 0.7 → 0.9 (more diverse completions)
#   5. beta: 0.01 → 0.04 (stronger KL penalty for stability)
#   6. save_steps: 50 → 25 (finer-grained checkpointing)
#   7. Added bertscore_max_length: 512 (fix BERTScore overflow)
#
# Root cause of v1 loss=0:
#   - LR too low during warmup (~1e-8)
#   - Low reward variance (10-30% groups with zero std)
#   - BERTScore failures degrading accuracy reward
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --rl-config configs/full_4modality_opd_nosft_lingshu7b_v2.yaml
# ============================================================

# --- Model (Student: Lingshu-7B base) ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset: Full 4-modality combined ---
dataset:
  domain: "full_4modality"
  tasks_path: "data/domains/full_4modality_combined/tasks.json"
  split_tasks_path: "data/domains/full_4modality_combined/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 3072
  max_completion_length: 1024

# --- Training (GRPO + OPD) — v2 fixes ---
training:
  output_dir: "checkpoints/full_4modality_opd_nosft_v2"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6          # v2: 10x increase (was 5e-7)
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03             # v2: faster warmup (was 0.05)
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 25                 # v2: finer checkpointing (was 50)
  eval_steps: 25
  save_total_limit: 15
  seed: 42

  # GRPO-specific — v2 tuned
  num_generations: 8              # keep at 8 (16 too slow), rely on higher temp for variance
  beta: 0.04                     # v2: stronger KL penalty (was 0.01)
  temperature: 0.9               # v2: more diverse completions (was 0.7)
  top_p: 0.95
  top_k: 50

  max_train_tasks: 500             # v2: 500 tasks (multi-turn too slow for 3338)
  loss_type: "grpo"
  scale_rewards: "none"

  dynamic_sampling: true
  dynamic_sampling_min_mixed_ratio: 0.1

  overlong_reward_shaping: true
  overlong_safe_length: 768
  overlong_penalty_factor: 0.5

# --- Reward — v2 with BERTScore fix ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.4
    - name: "format"
      weight: 0.2
    - name: "process"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"
  bertscore_max_length: 512      # v2: truncate to prevent overflow

# --- On-Policy Distillation (α=0.3) ---
opd:
  use_opd: true
  opd_teacher_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/sft_warmup_lingshu7b_v2_merged/merged"
  opd_mode: "cross_stage"
  opd_alpha: 0.3
  opd_lambda: 0.5
  opd_warmup_steps: 25           # v2: shorter OPD warmup (was 50)

# --- Environment ---
environment:
  max_turns: 5                     # v2: reduced from 15 (speed: ~3x faster per rollout)
  use_gym_env: true
  domains:
    - "medical_qa"
    - "visual_diagnosis"
    - "clinical_diagnosis"
    - "drug_interaction"
    - "ehr_management"
    - "triage_emergency"
    - "psychiatry"
    - "obstetrics"

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "full_4modality_opd_nosft_v2"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "Full 4-Modality OPD v2 — Lingshu-7B (No SFT, reward fixes)"
  description: >
    OPD v2 with fixes for loss=0.0 problem:
    10x higher LR, 2x more generations for reward variance,
    BERTScore overflow fix, higher temperature for exploration.
    Full 3,267 train tasks across 8 domains.
    α=0.3 (Pareto-dominant from RQ3 findings).
