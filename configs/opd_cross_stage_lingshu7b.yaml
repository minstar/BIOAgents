# ============================================================
# OPD Option 1: Cross-Stage Self-Distillation (GLM-5 style)
# ============================================================
# Teacher = SFT checkpoint (text QA strong, agentic weak)
# Student = Dr.GRPO checkpoint (agentic strong, text QA plateaued)
# Goal: Recover text QA ability while maintaining agentic competence.
#
# Cross-stage OPD addresses the format-accuracy transfer gap:
# the SFT teacher provides dense per-token supervision on text QA,
# while RL advantage handles agentic tool-use improvement.
#
# Reference: GLM-5 (arXiv:2602.15763), G-OPD (arXiv:2602.12125)
#
# Usage:
#   python scripts/train_two_stage.py \
#       --skip-sft \
#       --sft-checkpoint checkpoints/drgrpo_lingshu7b/checkpoint-950-merged \
#       --rl-config configs/opd_cross_stage_lingshu7b.yaml
# ============================================================

# --- Model (start from Dr.GRPO checkpoint as student) ---
model:
  name_or_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/models/Lingshu-7B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# --- LoRA / PEFT ---
peft:
  enabled: true
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Dataset ---
dataset:
  domain: "medical_qa"
  tasks_path: "data/domains/medical_qa_1000/tasks.json"
  split_tasks_path: "data/domains/medical_qa_1000/split_tasks.json"
  train_split: "train"
  eval_split: "test"
  max_prompt_length: 2048
  max_completion_length: 1024

# --- Training ---
training:
  output_dir: "checkpoints/opd_cross_stage_lingshu7b"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 50
  eval_steps: 25
  save_total_limit: 5
  seed: 42

  # GRPO-specific
  num_generations: 8
  beta: 0.01
  temperature: 0.7
  top_p: 0.95
  top_k: 50

  # Dr. GRPO normalization (proven effective)
  use_dr_grpo: true
  loss_type: "grpo"
  dynamic_sampling: false
  overlong_reward_shaping: false

# --- Reward ---
rewards:
  strategy: "grpo"
  functions:
    - name: "accuracy"
      weight: 0.6
    - name: "format"
      weight: 0.4
  bertscore_model: "microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext"

# --- On-Policy Distillation ---
opd:
  use_opd: true
  opd_teacher_path: "/data/project/private/minstar/workspace/BIOAgents/checkpoints/sft_warmup_lingshu7b_v2_merged/merged"
  opd_mode: "cross_stage"
  opd_alpha: 0.5          # 50% RL advantage + 50% OPD teacher advantage
  opd_lambda: 1.0         # Standard OPD (no reward extrapolation)
  opd_warmup_steps: 50    # Let RL stabilize before OPD kicks in

# --- Environment ---
environment:
  max_turns: 10
  use_gym_env: true

# --- Logging ---
logging:
  project: "pt2-minstar-gym-rl"
  run_name: "opd_cross_stage_lingshu7b"
  use_wandb: true
  log_dir: "logs/runs"

# --- Experiment metadata ---
meta:
  experiment: "OPD Option 1 — Cross-Stage Self-Distillation"
  description: >
    GLM-5-style cross-stage OPD. SFT checkpoint as teacher provides
    dense text QA supervision, Dr.GRPO student continues agentic RL.
    Tests whether OPD can recover text QA ability (61.8% → 62%+)
    while maintaining 5.1x agentic improvement.
